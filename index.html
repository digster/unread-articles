<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unread Articles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #a0a0a0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333;
            border-top-color: #888;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error { color: #e05050; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <p id="status">picking a random article...</p>
    </div>

    <script>
        (async () => {
            const status = document.getElementById("status");
            const spinner = document.getElementById("spinner");

            try {
                const resp = await fetch("urls.txt");
                if (!resp.ok) throw new Error(`Failed to load urls.txt (${resp.status})`);

                const text = await resp.text();
                const urls = text.trim().split("\n").filter(Boolean);

                if (urls.length === 0) {
                    spinner.style.display = "none";
                    status.textContent = "no articles saved yet";
                    return;
                }

                // Pick a random URL and redirect
                const url = urls[Math.floor(Math.random() * urls.length)];
                window.location.href = url;
            } catch (err) {
                spinner.style.display = "none";
                status.className = "error";
                status.textContent = `error: ${err.message}`;
            }
        })();
    </script>
</body>
</html>
